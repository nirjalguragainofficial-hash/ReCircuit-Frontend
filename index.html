    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReCircuit - Give your old electronics a second life. Find certified e-waste collection centers near you." />
    <meta name="keywords" content="e-waste recycling, electronics recycling, collection center, responsible recycling, ReCircuit" />

    <!-- Dark Mode Initializer Script -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <title>ReCircuit - Responsible E-Waste Recycling</title>
